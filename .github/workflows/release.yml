name: Build and Release Keyboards

on:
  workflow_dispatch:
    inputs:
      dryrun:
        description: 'If true the final release step will just upload the final artifact rather than creating a release.'
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: windows-

    steps:
      - name: Enforce tag ref
        if: github.ref_type != 'tag' && {{ !inputs.dryrun }}
        shell: pwsh
        run: |
          Write-Host "::error::This workflow can only be run against a tag or it must a dry run. Got ref_type=${{ github.ref_type }}, ref=${{ github.ref }}, dryrun={{ inputs.dryrun }}"
          exit 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::881490118399:role/accento
          aws-region: us-east-1

      - name: Checkout
        uses: actions/checkout@v6

      - name: Download tools from S3
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\tools | Out-Null
          aws s3 cp s3://accento-881490118399-us-east-1-an/msklc.exe C:\tools\msklc.exe
          aws s3 cp s3://accento-881490118399-us-east-1-an/autoit-v3.zip C:\tools\autoit-v3.zip

      - name: Extract AutoIt
        shell: pwsh
        run: |
          Expand-Archive -Path C:\tools\autoit-v3.zip -DestinationPath C:\autoit

      - name: Install MSKLC
        shell: pwsh
        run: |
          $autoit = "C:\autoit\install\AutoIt3.exe"
          if (-not (Test-Path $autoit)) { Write-Error "AutoIt3.exe not found at $autoit"; exit 1 }
          $proc = Start-Process -FilePath $autoit `
            -ArgumentList @("${{ github.workspace }}\scripts\klc_install.au3", "C:\tools\msklc.exe", "C:\tools", "C:\msklc") `
            -Wait -PassThru -NoNewWindow
          Write-Host "klc_install.au3 exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) { exit $proc.ExitCode }
          Start-Sleep -Seconds 5
          if (-not (Test-Path C:\msklc)) { Write-Error "MSKLC installation directory C:\msklc not found"; exit 1 }

      - name: Compile keyboard layouts
        shell: pwsh
        run: |
          $autoit = "C:\autoit\install\AutoIt3.exe"
          if (-not (Test-Path $autoit)) { Write-Error "AutoIt3.exe not found at $autoit"; exit 1 }
          $excluded = @('.github', 'scripts')
          $folders = Get-ChildItem -Path "${{ github.workspace }}" -Directory |
            Where-Object { $excluded -notcontains $_.Name }
          Write-Host "Keyboard folders found: $($folders.Name -join ', ')"

          $workspace = "C:\workspace"
          if (Test-Path $workspace) {
            Write-Error "Workspace $workspace already exists; aborting to avoid conflicts."
            exit 1
          }
          New-Item -ItemType Directory -Path $workspace | Out-Null

          foreach ($folder in $folders) {
            $klc = Join-Path $folder.FullName def.klc
            if (-not (Test-Path $klc)) {
              Write-Error "No def.klc in $($folder.Name) but expected to be keyboard definition"
              exit 1
            }
            Write-Host "Compiling $($folder.Name)"
            $proc = Start-Process -FilePath $autoit `
              -ArgumentList @("${{ github.workspace }}\scripts\klc_compile.au3", "C:\msklc\MSKLC.exe", $klc, $workspace, $folder.Name) `
              -Wait -PassThru -NoNewWindow
            Write-Host "klc_compile.au3 exit code: $($proc.ExitCode)"
            if ($proc.ExitCode -ne 0) { exit $proc.ExitCode }
            Start-Sleep -Seconds 2
          }
          Start-Sleep -Seconds 15

      - name: Package keyboards
        shell: pwsh
        run: |
          $excluded = @('.github', 'scripts')
          $folders = Get-ChildItem -Path "${{ github.workspace }}" -Directory |
            Where-Object { $excluded -notcontains $_.Name }
          if (Test-Path C:\release) { Write-Error "Release directory C:\release already exists; aborting."; exit 1 }
          New-Item -ItemType Directory -Path C:\release | Out-Null
          foreach ($folder in $folders) {
            $folder_workspace = "C:\workspace\$($folder.Name)"
            if (-not (Test-Path $folder_workspace)) {
              Write-Error "Expected workspace folder $folder_workspace not found"
              exit 1
            }
            $setup = "$folder_workspace\setup.exe"
            if (-not (Test-Path $setup)) {
              Write-Error "Expected setup.exe not found in $folder_workspace"
              exit 1
            }
            $dest = "C:\release\$($folder.Name)"
            New-Item -ItemType Directory -Path $dest | Out-Null
            Copy-Item -Path $setup -Destination $dest
          }
          Compress-Archive -Path C:\release\* -DestinationPath C:\keyboards.zip

      - name: Upload artifact (dryrun)
        if: ${{ inputs.dryrun }}
        uses: actions/upload-artifact@v7
        with:
          name: keyboards
          path: C:\keyboards.zip

      - name: Create GitHub release
        if: ${{ !inputs.dryrun }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            --title "${{ github.ref_name }}" `
            --generate-notes `
            C:\keyboards.zip
