name: Build and Release Keyboards

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::881490118399:role/accento
          aws-region: us-east-1

      - name: Download tools from S3
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\tools | Out-Null
          aws s3 cp s3://accento-881490118399-us-east-1-an/msklc.exe C:\tools\msklc.exe
          aws s3 cp s3://accento-881490118399-us-east-1-an/autoit-v3.zip C:\tools\autoit-v3.zip

      - name: Extract AutoIt
        shell: pwsh
        run: |
          Expand-Archive -Path C:\tools\autoit-v3.zip -DestinationPath C:\autoit

      - name: Install MSKLC
        shell: pwsh
        run: |
          $autoit = Get-ChildItem -Path C:\autoit -Recurse -Filter AutoIt3.exe |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $autoit) { Write-Error "AutoIt3.exe not found under C:\autoit"; exit 1 }
          Write-Host "AutoIt3.exe found at: $autoit"
          try {
            $proc = Start-Process -FilePath $autoit `
              -ArgumentList @("${{ github.workspace }}\scripts\klc_install.au3", "C:\tools\msklc.exe", "C:\tools", "C:\msklc") `
              -Wait -PassThru -NoNewWindow
          } catch {
            Write-Host "Exception running klc_install.au3: $_"
            exit 1
          }
          Write-Host "klc_install.au3 exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) { exit $proc.ExitCode }
          Write-Host "Waiting 15s for installation to settle..."
          Start-Sleep -Seconds 15
          Write-Host "Checking MSKLC installation under C:\msklc..."
          if (Test-Path C:\msklc) {
            Get-ChildItem C:\msklc -Recurse | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "C:\msklc does not exist"
          }

      - name: Compile keyboard layouts
        shell: pwsh
        run: |
          $autoit = Get-ChildItem -Path C:\autoit -Recurse -Filter AutoIt3.exe |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $autoit) { Write-Error "AutoIt3.exe not found under C:\autoit"; exit 1 }
          Write-Host "AutoIt3.exe found at: $autoit"
          $excluded = @('.github', 'scripts')
          $folders = Get-ChildItem -Path "${{ github.workspace }}" -Directory |
            Where-Object { $excluded -notcontains $_.Name }
          Write-Host "Keyboard folders found: $($folders.Name -join ', ')"
          foreach ($folder in $folders) {
            $klc = Join-Path $folder.FullName def.klc
            if (-not (Test-Path $klc)) {
              Write-Host "No def.klc in $($folder.Name), skipping."
              continue
            }
            # rooted_workspace must be exactly C:\<name> (klc_compile.au3 rejects deeper paths)
            $workspace = "C:\$($folder.Name)"
            if (Test-Path $workspace) {
              Write-Error "Workspace $workspace already exists; aborting to avoid conflicts."
              exit 1
            }
            New-Item -ItemType Directory -Path $workspace | Out-Null
            Write-Host "Compiling $($folder.Name): $klc -> $workspace"
            try {
              $proc = Start-Process -FilePath $autoit `
                -ArgumentList @("${{ github.workspace }}\scripts\klc_compile.au3", "C:\msklc\MSKLC.exe", $klc, $workspace) `
                -Wait -PassThru -NoNewWindow
            } catch {
              Write-Host "Exception running klc_compile.au3: $_"
              exit 1
            }
            Write-Host "klc_compile.au3 exit code: $($proc.ExitCode)"
            if ($proc.ExitCode -ne 0) { exit $proc.ExitCode }
          }
          Write-Host "All folders processed. Starting 60s sleep..."
          Start-Sleep -Seconds 60
          Write-Host "Sleep complete. Workspace contents:"
          foreach ($folder in $folders) {
            $workspace = "C:\$($folder.Name)"
            Write-Host "--- $workspace ---"
            Get-ChildItem $workspace -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }
          }

      - name: Package keyboards
        shell: pwsh
        run: |
          $excluded = @('.github', 'scripts')
          $folders = Get-ChildItem -Path "${{ github.workspace }}" -Directory |
            Where-Object { $excluded -notcontains $_.Name }
          New-Item -ItemType Directory -Force -Path C:\release | Out-Null
          foreach ($folder in $folders) {
            $workspace = "C:\$($folder.Name)"
            if (-not (Test-Path $workspace)) { continue }
            $dest = "C:\release\$($folder.Name)"
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
            Copy-Item -Path "$workspace\setup.exe" -Destination $dest
          }
          Compress-Archive -Path C:\release\* -DestinationPath C:\keyboards.zip

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            --title "${{ github.ref_name }}" `
            --generate-notes `
            C:\keyboards.zip
